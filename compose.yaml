services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fluent
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - fluent-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fluent"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${PORT:-9999}:9999"
    volumes:
      - ./src:/app/src:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./drizzle.config.ts:/app/drizzle.config.ts:ro
      - ./docker-entrypoint.sh:/app/docker-entrypoint.sh:ro
      - /app/node_modules
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/fluent
      EXPORTS_DIR: /app/exports
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /app/.cache:noexec,nosuid,size=128m
      - /app/exports:noexec,nosuid,size=256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./src:/app/src:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - /app/node_modules
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/fluent
      EXPORTS_DIR: /app/exports
    command: ["dumb-init", "--", "npx", "tsx", "watch", "src/workers/standalone-worker.ts"]
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /app/.cache:noexec,nosuid,size=128m
      - /app/exports:noexec,nosuid,size=256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      api:
        condition: service_healthy

volumes:
  fluent-pgdata:
